<style>
:root {
--rose:   #e8356d;
--rose-s: #f07098;
--rose-xs:rgba(232,53,109,.07);
--rose-gl:rgba(232,53,109,.14);
--bg:     #ffffff;
--bg2:    #f8f7f9;
--bg3:    #f2eff5;
--ink:    #1a0f24;
--ink2:   #3a2d48;
--ink3:   #7a6880;
--line:   rgba(0,0,0,.08);
--liner:  rgba(232,53,109,.18);
--serif:  'Cormorant Garamond',Georgia,serif;
--sans:   'Inter',system-ui,sans-serif;
--max:    1140px;
--r:      8px;
--rxl:    24px;
--ease:   cubic-bezier(.22,1,.36,1);
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.w{max-width:var(--max);margin:0 auto;padding:0 2rem}

/* NAV */
nav{position:sticky;top:0;z-index:300;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.navi{display:flex;align-items:center;justify-content:space-between;height:70px}
.nl{display:flex;align-items:center;gap:2rem;list-style:none}
.nl a{font-size:.8rem;font-weight:400;color:var(--ink2);transition:color .2s}
.nl a:hover{color:var(--ink)}
.nbtn{display:inline-flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:500;background:var(--rose);color:#fff!important;padding:.42rem 1.2rem;border-radius:var(--r);transition:all .2s!important}
.nbtn:hover{background:#c82c5c!important;transform:translateY(-1px)!important}

/* BREADCRUMB */
.breadcrumb{background:var(--bg2);padding:.75rem 0;border-bottom:1px solid var(--line)}
.breadcrumb p{font-size:.75rem;color:var(--ink3)}
.breadcrumb a{color:var(--rose)}
.breadcrumb span{margin:0 .4rem;color:var(--ink3)}

/* HERO */
.phero{background:var(--ink);padding:5rem 0 4rem;position:relative;overflow:hidden}
.phero::before{content:'';position:absolute;right:-100px;top:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,53,109,.15) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.ey{display:inline-flex;align-items:center;gap:.45rem;font-size:.67rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--rose-s);margin-bottom:.9rem}
.ey::before{content:'';width:16px;height:1.5px;background:var(--rose-s)}
.phero h1{font-family:var(--serif);font-size:clamp(2rem,4.5vw,3.8rem);font-weight:300;line-height:1.1;color:#fff;max-width:780px}
.phero h1 em{font-style:italic;color:var(--rose-s)}
.phero .sub{font-size:.88rem;color:rgba(255,255,255,.45);margin-top:1rem;letter-spacing:.05em}

/* LAYOUT */
.page-layout{display:grid;grid-template-columns:1fr 340px;gap:4rem;align-items:start;padding:5rem 0 7rem}
.content-col h2{font-family:var(--serif);font-size:1.7rem;font-weight:300;color:var(--ink);margin:3rem 0 1rem;padding-bottom:.6rem;border-bottom:1px solid var(--line)}
.content-col h2 em{font-style:italic;color:var(--rose)}
.content-col h2:first-of-type{margin-top:0}
.content-col p{font-size:.9rem;color:var(--ink2);line-height:1.82;margin-bottom:.9rem}
.content-col p strong{color:var(--ink);font-weight:500}
.content-col ul{margin:.5rem 0 1rem 0;list-style:none}
.content-col ul li{font-size:.88rem;color:var(--ink2);line-height:1.75;padding:.4rem 0 .4rem 1.4rem;border-bottom:1px solid var(--line);position:relative}
.content-col ul li::before{content:'→';position:absolute;left:0;color:var(--rose);font-size:.8rem}
.content-col ul li:last-child{border-bottom:none}

/* QUOTE */
.pull-quote{background:var(--bg2);border-left:3px solid var(--rose);border-radius:0 var(--r) var(--r) 0;padding:1.4rem 1.8rem;margin:2rem 0}
.pull-quote p{font-family:var(--serif);font-size:1.15rem;font-style:italic;color:var(--ink2);line-height:1.55;margin:0 0 .5rem}
.pull-quote cite{font-size:.75rem;color:var(--ink3);font-style:normal;letter-spacing:.05em}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:1.2rem;margin:1.5rem 0}
.step{display:flex;gap:1.2rem;background:var(--bg);border:1px solid var(--line);border-radius:var(--rxl);padding:1.5rem 1.5rem;transition:all .25s var(--ease)}
.step:hover{border-color:var(--liner);box-shadow:0 4px 20px rgba(232,53,109,.07);transform:translateX(4px)}
.step-num{font-family:var(--serif);font-size:1.4rem;color:var(--rose);min-width:28px;padding-top:.1rem;line-height:1}
.step-body h4{font-family:var(--serif);font-size:1.05rem;font-weight:400;color:var(--ink);margin-bottom:.35rem}
.step-body p{font-size:.84rem;color:var(--ink2);line-height:1.7;margin:0}

.formato-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0}
.fcard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:1.3rem 1.2rem;text-align:center}

.fcard h4{font-family:var(--serif);font-size:1rem;font-weight:400;color:var(--ink);margin-bottom:.3rem}
.fcard p{font-size:.75rem;color:var(--ink3);line-height:1.4;margin:0}
.precio-box{background:var(--rose-xs);border:1px solid var(--liner);border-radius:var(--rxl);padding:1.5rem 1.8rem;margin:1.5rem 0;display:flex;align-items:center;gap:1.5rem}
.precio-num{font-family:var(--serif);font-size:2.2rem;color:var(--rose);line-height:1;white-space:nowrap}
.precio-desc{font-size:.83rem;color:var(--ink2);line-height:1.6}
.disclaimer{background:var(--bg2);border-radius:var(--r);padding:1rem 1.2rem;margin-top:1rem}
.disclaimer p{font-size:.75rem;color:var(--ink3);line-height:1.55;margin:0}

/* SIDEBAR */
.sidebar{position:sticky;top:6rem;display:flex;flex-direction:column;gap:1.2rem}
.scard{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rxl);padding:1.8rem 1.6rem}
.scard h3{font-family:var(--serif);font-size:1.2rem;font-weight:400;color:var(--ink);margin-bottom:.6rem}
.scard h3 em{font-style:italic;color:var(--rose)}
.scard p{font-size:.82rem;color:var(--ink2);line-height:1.7;margin-bottom:1.1rem}
.scard .btn-p{width:100%;justify-content:center;font-size:.82rem;padding:.78rem 1rem}
.scard .btn-g{width:100%;justify-content:center;font-size:.82rem;padding:.78rem 1rem;margin-top:.6rem}
.btn-p{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--sans);font-size:.83rem;font-weight:500;padding:.82rem 1.7rem;border-radius:var(--r);background:var(--rose);color:#fff;transition:all .25s var(--ease);border:none;cursor:pointer;box-shadow:0 4px 16px var(--rose-gl)}
.btn-p:hover{background:#c82c5c;transform:translateY(-1px)}
.btn-g{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--sans);font-size:.83rem;font-weight:400;padding:.82rem 1.7rem;border-radius:var(--r);background:transparent;color:var(--ink2);border:1.5px solid var(--line);transition:all .25s var(--ease);cursor:pointer}
.btn-g:hover{border-color:var(--rose);color:var(--rose)}
.servicios-list{display:flex;flex-direction:column;gap:0}
.srv-link{display:flex;align-items:center;justify-content:space-between;padding:.7rem 0;border-bottom:1px solid var(--line);font-size:.82rem;color:var(--ink2);transition:all .2s;cursor:pointer}
.srv-link:first-child{border-top:1px solid var(--line)}
.srv-link:hover{color:var(--rose);padding-left:.4rem}
.srv-link.active{color:var(--rose);font-weight:500}
.srv-arr{font-size:.75rem;color:var(--ink3)}

/* POR QUÉ */
#porque{background:var(--bg2);padding:5rem 0}
.porque-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;margin-top:2.5rem}
.porque-txt p{font-size:.88rem;color:var(--ink2);line-height:1.82;margin-bottom:.9rem}
.porque-txt p strong{color:var(--ink);font-weight:500}
.credenciales{display:flex;flex-direction:column;gap:.75rem}
.cred{display:flex;align-items:flex-start;gap:.8rem;padding:1rem 1.2rem;background:var(--card);border:1px solid var(--line);border-radius:var(--r);transition:all .25s var(--ease)}
.cred:hover{border-color:var(--liner);box-shadow:0 4px 16px rgba(232,53,109,.07)}
.cred-ico{font-size:1.1rem;flex-shrink:0;margin-top:.1rem}
.cred-txt h4{font-size:.82rem;font-weight:500;color:var(--ink);margin-bottom:.2rem}
.cred-txt p{font-size:.75rem;color:var(--ink3);line-height:1.4;margin:0}

/* CTA FINAL */
.page-cta{background:var(--ink);padding:5rem 0;text-align:center;position:relative;overflow:hidden}
.page-cta::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(232,53,109,.12) 0%,transparent 70%);pointer-events:none}
.page-cta h2{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;color:#fff;margin-bottom:1rem;position:relative;z-index:1}
.page-cta h2 em{font-style:italic;color:var(--rose-s)}
.page-cta p{font-size:.88rem;color:rgba(255,255,255,.5);max-width:420px;margin:0 auto 2rem;line-height:1.78;position:relative;z-index:1}
.cta-row{display:flex;align-items:center;justify-content:center;gap:.9rem;flex-wrap:wrap;position:relative;z-index:1}
.btn-p-lg{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--sans);font-size:.9rem;font-weight:500;padding:.95rem 2rem;border-radius:var(--r);background:var(--rose);color:#fff;transition:all .25s var(--ease);border:none;cursor:pointer;box-shadow:0 4px 16px var(--rose-gl)}
.btn-p-lg:hover{background:#c82c5c;transform:translateY(-2px)}
.btn-g-inv{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--sans);font-size:.83rem;font-weight:400;padding:.82rem 1.7rem;border-radius:var(--r);background:transparent;color:rgba(255,255,255,.6);border:1.5px solid
